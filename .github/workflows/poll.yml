name: poll

# Free serverless scheduler: no always-on server, just a stateless one-shot.
on:
  schedule:
    # Every 30 min at :06/:36 (NOT :00/:30 — the top/half of the hour are GitHub's most contended
    # cron slots and scheduled runs there are frequently dropped; an odd offset is far more reliable).
    # Window 04:06–20:36 UTC, Sunday–Friday. GitHub cron is UTC-only and can't follow DST, and Israel
    # is UTC+2 (winter) / UTC+3 (summer). This UTC window never lands in Israel's 00:00–06:00 quiet
    # hours in EITHER offset (winter ~06:00–22:30, summer ~07:00–23:30). `0-5` = Sun–Fri, skip
    # Saturday (Shabbat). Runs are best-effort and may still start a few minutes late.
    - cron: '6,36 4-20 * * 0-5'
  workflow_dispatch: {} # manual trigger from the Actions tab (use this for the first baseline seed)

# Avoid overlapping runs if one cycle runs long.
concurrency:
  group: poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Job-level env: config validation loads the full schema on import, so every step that runs
    # our code (migrate as well as poll) needs all vars, not just the ones it appears to use.
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SCORE_THRESHOLD: ${{ secrets.SCORE_THRESHOLD }}
      # LLM scoring (Phase 3) is OFF by default (free keyword scorer). To enable it, add a
      # repository variable SCORER=llm (Settings -> Secrets and variables -> Actions -> Variables)
      # AND the ANTHROPIC_API_KEY secret. Unset SCORER => keyword scorer.
      SCORER: ${{ vars.SCORER }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Apply migrations
        run: npm run migrate

      - name: Run one poll cycle
        run: npm run poll
