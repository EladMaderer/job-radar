name: poll

# Free serverless scheduler: no always-on server, just a stateless one-shot.
on:
  schedule:
    # Every 30 min at :07/:37 (odd offset, NOT the contended :00/:30 slots — GitHub drops top/half-
    # hour scheduled runs more often). Israel-local daytime, anchored to summer (IDT = UTC+3); GitHub
    # cron is UTC-only and can't follow DST, so in winter (IST = UTC+2) these fire ~1h earlier Israel
    # time (still daytime — never in the 00:00–06:00 quiet hours). Saturday: no run (Shabbat).
    - cron: '7,37 4-15 * * 0-4' # Sun–Thu, 07:07–18:37 Israel (every 30 min)
    - cron: '7,37 4-12 * * 5' # Fri, 07:07–15:37 Israel (every 30 min)
  workflow_dispatch: {} # manual trigger from the Actions tab (use this for the first baseline seed)

# Avoid overlapping runs if one cycle runs long.
concurrency:
  group: poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Job-level env: config validation loads the full schema on import, so every step that runs
    # our code (migrate as well as poll) needs all vars, not just the ones it appears to use.
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SCORE_THRESHOLD: ${{ secrets.SCORE_THRESHOLD }}
      # LLM scoring (Phase 3) is OFF by default (free keyword scorer). To enable it, add a
      # repository variable SCORER=llm (Settings -> Secrets and variables -> Actions -> Variables)
      # AND the ANTHROPIC_API_KEY secret. Unset SCORER => keyword scorer.
      SCORER: ${{ vars.SCORER }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Apply migrations
        run: npm run migrate

      - name: Run one poll cycle
        run: npm run poll
