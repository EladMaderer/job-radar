name: poll

# Free serverless scheduler: no always-on server, just a stateless one-shot.
on:
  schedule:
    # Every 30 min, 04:00–20:30 UTC, Sunday–Friday.
    # GitHub cron is UTC-only and can't follow DST, and Israel is UTC+2 (winter) / UTC+3 (summer).
    # This UTC window is the intersection that never lands in Israel's 00:00–06:00 quiet hours in
    # EITHER offset: in winter it covers Israel 06:00–22:30, in summer 07:00–23:30 (a little edge
    # coverage traded for guaranteeing no night-time polls). `0-5` = Sun–Fri, skipping Saturday
    # (Shabbat). Runs are best-effort and may start a few minutes late.
    - cron: '0,30 4-20 * * 0-5'
  workflow_dispatch: {} # manual trigger from the Actions tab (use this for the first baseline seed)

# Avoid overlapping runs if one cycle runs long.
concurrency:
  group: poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Job-level env: config validation loads the full schema on import, so every step that runs
    # our code (migrate as well as poll) needs all vars, not just the ones it appears to use.
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SCORE_THRESHOLD: ${{ secrets.SCORE_THRESHOLD }}
      # Optional (Phase 3): set this secret to enable LLM scoring. Unset => free keyword scorer.
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Apply migrations
        run: npm run migrate

      - name: Run one poll cycle
        run: npm run poll
