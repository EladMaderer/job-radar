name: theirstack

# Market-wide second source on a SLOW cadence — TheirStack bills 1 API credit per job returned
# (free tier: 200/month), so the fetch is incremental (discovered_at watermark) and this schedule
# is deliberately sparse. The 30-min ATS poll workflow is separate and unaffected.
on:
  schedule:
    # Times are Israel-local, anchored to summer (IDT = UTC+3); GitHub cron is UTC-only and can't
    # follow DST, so in winter (IST = UTC+2) these fire ~1h earlier Israel time — fine for polling.
    # Credits are only spent on genuinely-new jobs (watermark); the in-code monthly guard is the cap.
    - cron: '0 6,14 * * 0-4' # Sun–Thu, 09:00 & 17:00 Israel
    - cron: '0 11 * * 5' # Fri, 14:00 Israel (Saturday: no run)
  workflow_dispatch: {} # manual trigger for testing / the first baseline seed

concurrency:
  group: theirstack
  cancel-in-progress: false

jobs:
  theirstack:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Job-level env: config validation loads the full schema on import, so every step that runs
    # our code (migrate as well as poll) needs all vars, not just the ones it appears to use.
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SCORE_THRESHOLD: ${{ secrets.SCORE_THRESHOLD }}
      SCORER: ${{ vars.SCORER }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      # Missing key => the run is a clear no-op (exit 0), never a failure.
      THEIRSTACK_API_KEY: ${{ secrets.THEIRSTACK_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Apply migrations
        run: npm run migrate

      - name: Run one TheirStack cycle
        run: npm run poll:theirstack
