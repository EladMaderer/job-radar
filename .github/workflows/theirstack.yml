name: theirstack

# Market-wide second source on a SLOW cadence — TheirStack bills 1 API credit per job returned
# (free tier: 200/month), so the fetch is incremental (discovered_at watermark) and this schedule
# is deliberately sparse. The 30-min ATS poll workflow is separate and unaffected.
on:
  schedule:
    # Every 2h at :36 Israel-local, anchored to summer (IDT = UTC+3); GitHub cron is UTC-only and
    # can't follow DST, so in winter (IST = UTC+2) these fire ~1h earlier Israel time — fine.
    # Minute :36 (not :00): top-of-the-hour cron slots are GitHub's most contended and scheduled
    # runs there are frequently dropped; an odd offset is much more reliable. Cadence is nearly free
    # (watermark: each run only fetches jobs discovered since the last).
    - cron: '36 5,7,9,11,13,15 * * 0-4' # Sun–Thu, 08:36–18:36 Israel (every 2h)
    - cron: '36 5,7,9 * * 5' # Fri, 08:36–12:36 Israel (every 2h; Saturday: no run)
  workflow_dispatch: {} # manual trigger for testing / a fresh backfill

concurrency:
  group: theirstack
  cancel-in-progress: false

jobs:
  theirstack:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Job-level env: config validation loads the full schema on import, so every step that runs
    # our code (migrate as well as poll) needs all vars, not just the ones it appears to use.
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SCORE_THRESHOLD: ${{ secrets.SCORE_THRESHOLD }}
      SCORER: ${{ vars.SCORER }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      # Missing key => the run is a clear no-op (exit 0), never a failure.
      THEIRSTACK_API_KEY: ${{ secrets.THEIRSTACK_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Apply migrations
        run: npm run migrate

      - name: Run one TheirStack cycle
        run: npm run poll:theirstack
