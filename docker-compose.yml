services:
  postgres:
    image: postgres:16-alpine
    container_name: jobs-radar-db
    environment:
      POSTGRES_USER: jobsradar
      POSTGRES_PASSWORD: jobsradar
      POSTGRES_DB: jobsradar
    # Host port 5433 (not 5432) to avoid clashing with a native Postgres if you run one.
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
