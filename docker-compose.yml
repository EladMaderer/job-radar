services:
  postgres:
    image: postgres:16-alpine
    container_name: jobs-radar-db
    environment:
      POSTGRES_USER: jobsradar
      POSTGRES_PASSWORD: jobsradar
      POSTGRES_DB: jobsradar
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
